name: CI Formatting Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1 -- Code Quality Checks (Global Formatting)
  # ============================================================
  code_quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Global Formatters
        run: npm install -g prettier prettier-plugin-solidity

      - name: Run Global Prettier Check
        shell: bash
        run: |
          set -euo pipefail
          NODE_GLOBAL=$(npm root -g)
          echo "=== Running Prettier check for all supported files ==="
          # Scans entire repo; automatically finds files in backend, web, etc.
          prettier --plugin="$NODE_GLOBAL/prettier-plugin-solidity/dist/index.js" \
            --check "**/*.{js,jsx,ts,tsx,json,html,css,md,sol,yml,yaml}"

      - name: Finalize Check
        run: echo "All formatting checks completed successfully."

  # ============================================================
  # Job 2 -- LendSmart backend unit & integration tests
  # ============================================================
  backend_tests:
    name: Backend Tests (LendSmart)
    runs-on: ubuntu-latest
    needs: code_quality

    defaults:
      run:
        working-directory: code/backend

    env:
      NODE_ENV: test
      SKIP_REDIS: "true"
      SKIP_DB_CONNECTION: "true"
      LOG_LEVEL: error

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run Jest test suite with coverage
        timeout-minutes: 5
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: code/backend/coverage/
          retention-days: 14

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "=== Coverage summary ==="
            node -e "
              const fs = require('fs');
              const lcov = fs.readFileSync('coverage/lcov.info', 'utf8');
              const lines = lcov.split('\n');
              let lf = 0, lh = 0;
              lines.forEach(l => {
                if (l.startsWith('LF:')) lf += parseInt(l.slice(3));
                if (l.startsWith('LH:')) lh += parseInt(l.slice(3));
              });
              const pct = lf ? ((lh / lf) * 100).toFixed(1) : '0.0';
              console.log('Lines covered : ' + lh + ' / ' + lf + ' (' + pct + '%)');
            "
          else
            echo "No lcov.info found -- skipping summary."
          fi
