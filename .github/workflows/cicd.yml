name: CI Formatting Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1 -- Code formatting (Python / Prettier / Solidity)
  # ============================================================
  formatting_check:
    runs-on: ubuntu-latest

    env:
      CODE_DIR: code
      WEB_FRONTEND_DIR: web-frontend
      MOBILE_FRONTEND_DIR: mobile-frontend
      INFRASTRUCTURE_DIR: infrastructure

    steps:
      # -------------------------------
      # Checkout repository
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Python Setup + Caching
      # -------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python formatters
        run: pip install --upgrade pip && pip install autoflake black==25.11.0

      # -------------------------------
      # Run Python formatting checks
      # -------------------------------
      - name: Run Python formatting checks (code directory)
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${{ env.CODE_DIR }}" ]; then
            echo "Code directory '${{ env.CODE_DIR }}' not found -- skipping Python formatting."
            exit 0
          fi

          echo "=== Preparing temporary copy of code/ for autoflake ==="
          TMP_COPY="$(mktemp -d)"
          cp -a "${{ env.CODE_DIR }}/." "$TMP_COPY/"

          echo "=== Running autoflake (will modify temp copy) ==="
          autoflake \
            --remove-all-unused-imports \
            --remove-unused-variables \
            --recursive \
            --ignore-init-module-imports \
            --in-place \
            "$TMP_COPY"

          echo "=== Comparing code/ with autoflake-modified copy ==="
          if ! diff -r "${{ env.CODE_DIR }}" "$TMP_COPY" > /dev/null; then
            echo "autoflake found formatting/unused-imports issues in ${CODE_DIR}."
            echo "Run locally: autoflake --remove-all-unused-imports --remove-unused-variables --recursive --ignore-init-module-imports --in-place ${CODE_DIR}"
            rm -rf "$TMP_COPY"
            exit 1
          fi

          rm -rf "$TMP_COPY"

          echo "=== Running black (check mode) on ${CODE_DIR} ==="
          black "${{ env.CODE_DIR }}" --check

      # -------------------------------
      # Node + npm caching
      # -------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tools/package-lock.json

      - name: Install Node dependencies
        working-directory: tools
        run: npm ci

      # -------------------------------
      # Prettier checks
      # -------------------------------

      # 1) Web frontend
      - name: Run Prettier Checks (web-frontend)
        if: ${{ env.WEB_FRONTEND_DIR != '' }}
        working-directory: tools
        run: |
          echo "=== Running Prettier (web-frontend) ==="
          npx --no-install prettier --check "../${{ env.WEB_FRONTEND_DIR }}/**/*.{js,jsx,ts,tsx,json,html,css,md}" --ignore-path ../.prettierignore || {
            echo "Prettier issues found in ${WEB_FRONTEND_DIR}."
            exit 1
          }

      # 2) Mobile frontend
      - name: Run Prettier Checks (mobile-frontend)
        if: ${{ env.MOBILE_FRONTEND_DIR != '' }}
        working-directory: tools
        run: |
          echo "=== Running Prettier (mobile-frontend) ==="
          npx --no-install prettier --check "../${{ env.MOBILE_FRONTEND_DIR }}/**/*.{js,jsx,ts,tsx,json,html,css,md}" --ignore-path ../.prettierignore || {
            echo "Prettier issues found in ${MOBILE_FRONTEND_DIR}."
            exit 1
          }

      # 3) Repository-wide Markdown check (ALL .md files)
      - name: Run Prettier Checks (all .md files in repo)
        working-directory: tools
        run: |
          echo "=== Running Prettier (all .md files) ==="
          npx --no-install prettier --check "../**/*.md" --ignore-path ../.prettierignore || {
            echo "Prettier formatting issues detected in markdown files across the repo."
            exit 1
          }

      # 4) Infrastructure YAML/YML files only
      - name: Run Prettier Checks (infrastructure YAML)
        working-directory: tools
        run: |
          if [ -n "${{ env.INFRASTRUCTURE_DIR }}" ] && [ -d "../${{ env.INFRASTRUCTURE_DIR }}" ]; then
            echo "=== Running Prettier (infrastructure YAML/YML files) in ${INFRASTRUCTURE_DIR} ==="
            npx --no-install prettier --check "../${{ env.INFRASTRUCTURE_DIR }}/**/*.{yml,yaml}" --ignore-path ../.prettierignore || {
              echo "Prettier formatting issues detected in ${INFRASTRUCTURE_DIR} YAML/YML files."
              exit 1
            }
          else
            echo "No infrastructure directory '${{ env.INFRASTRUCTURE_DIR }}' found or INFRASTRUCTURE_DIR unset -- skipping infra YAML checks."
          fi

      # 5) Solidity files (entire repo)
      - name: Run Prettier Checks (Solidity)
        working-directory: tools
        run: |
          echo "=== Running Prettier (all .sol files) ==="
          if find .. -name "*.sol" -not -path "*/node_modules/*" | grep -q .; then
            npx --no-install prettier --config .prettierrc --check "../**/*.sol" || {
              echo "Prettier formatting issues detected in Solidity files."
              exit 1
            }
          else
            echo "No .sol files found -- skipping Solidity check."
          fi

      # -------------------------------
      # Finalize
      # -------------------------------
      - name: Finalize Check
        run: echo "All formatting checks completed successfully."

  # ============================================================
  # Job 2 -- LendSmart backend unit & integration tests
  #
  # Runs in parallel with formatting_check (no "needs:" dependency).
  # No external services are required:
  #   - MongoDB  : mongodb-memory-server, spun up by tests/globalSetup.js
  #   - Redis    : in-memory fallback activated by SKIP_REDIS=true
  #   - web-push : resolved by Jest moduleNameMapper to __mocks__/web-push.js;
  #                intentionally NOT listed in package.json so the lockfile
  #                stays in sync and "npm ci" succeeds. Add it to package.json
  #                and re-run "npm install" only when VAPID push notifications
  #                are ready for production.
  #
  # Why not @shelf/jest-mongodb?
  #   Declared in devDependencies but never imported anywhere in the project.
  #   It also requires Node >=22 while the project targets >=18. Removed from
  #   package.json; the project uses its own tests/fakeMongoServer.js instead.
  # ============================================================
  backend_tests:
    name: Backend Tests (LendSmart)
    runs-on: ubuntu-latest

    defaults:
      run:
        # All steps run inside the backend directory unless overridden.
        working-directory: code/backend

    env:
      # Prevents the app from attempting real Redis / DB connections at boot.
      # The actual test MongoDB URI is injected by tests/globalSetup.js via
      # mongodb-memory-server; all other secrets (JWT_SECRET, ENCRYPTION_KEY,
      # etc.) are also set there -- no GitHub Secrets are needed for tests.
      NODE_ENV: test
      SKIP_REDIS: "true"
      SKIP_DB_CONNECTION: "true"
      # Suppress verbose winston output on the CI runner log.
      LOG_LEVEL: error

    steps:
      # -------------------------------
      # Checkout
      # -------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------------
      # Node.js setup + dependency cache
      # -------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # >=18 satisfies package.json engines field; 20 is the current LTS.
          # Node 22 is NOT required -- @shelf/jest-mongodb (the only package
          # that demanded >=22) has been removed as it was unused.
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code/backend/package-lock.json

      - name: Install dependencies
        # npm ci requires package.json and package-lock.json to be in sync.
        # web-push is intentionally absent from both (see job comment above),
        # so "npm ci" is safe and gives reproducible, lockfile-verified installs.
        run: npm ci

      # -------------------------------
      # Test
      # -------------------------------
      - name: Run Jest test suite with coverage
        # The suite takes ~100 s locally on a warm machine.
        # 5 minutes gives comfortable headroom on a cold CI runner.
        timeout-minutes: 5
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      # -------------------------------
      # Artifacts
      # -------------------------------
      - name: Upload coverage report
        # Upload even on test failure so coverage is inspectable on red runs.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: code/backend/coverage/
          retention-days: 14

      # -------------------------------
      # Coverage summary in the job log
      # -------------------------------
      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "=== Coverage summary ==="
            node -e "
              const fs = require('fs');
              const lcov = fs.readFileSync('coverage/lcov.info', 'utf8');
              const lines = lcov.split('\n');
              let lf = 0, lh = 0;
              lines.forEach(l => {
                if (l.startsWith('LF:')) lf += parseInt(l.slice(3));
                if (l.startsWith('LH:')) lh += parseInt(l.slice(3));
              });
              const pct = lf ? ((lh / lf) * 100).toFixed(1) : '0.0';
              console.log('Lines covered : ' + lh + ' / ' + lf + ' (' + pct + '%)');
            "
          else
            echo "No lcov.info found -- skipping summary."
          fi
