version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# LendSmart - Full Stack Docker Compose
# Services: Backend API (Node.js), Credit Risk ML (Python), MongoDB, Redis
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Backend API (Node.js) ─────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: lendsmart-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9229:9229"
    environment:
      NODE_ENV: development
      PORT: "3000"
      MONGODB_URI: "mongodb://admin:admin123@mongo:27017/lendsmart_dev?authSource=admin"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: redis123
      JWT_SECRET: "dev-jwt-secret-change-in-production-min-32-chars"
      JWT_EXPIRE: "1h"
      REFRESH_TOKEN_SECRET: "dev-refresh-secret-change-in-production-min-32-chars"
      REFRESH_TOKEN_EXPIRE: "7d"
      ENCRYPTION_MASTER_KEY: "dev-encryption-master-key-exactly-32ch"
      LOG_LEVEL: debug
      ALLOWED_ORIGINS: "http://localhost:3001,http://localhost:8080"
      ADMIN_EMAIL: "admin@lendsmart.com"
      AI_RISK_MODEL_ENDPOINT: "http://credit-risk:8000/predict/risk"
      AI_CREDIT_MODEL_ENDPOINT: "http://credit-risk:8000/predict"
      AI_FRAUD_MODEL_ENDPOINT: "http://credit-risk:8000/predict/fraud"
      CREDIT_SCORING_SERVICE_URL: "http://credit-risk:8000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_logs:/app/logs
      - backend_uploads:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lendsmart-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ─── Credit Risk ML Service (Python) ──────────────────────────────────────
  credit-risk:
    build:
      context: .
      dockerfile: ml_services/credit_risk/Dockerfile
      target: production
    container_name: lendsmart-credit-risk
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: info
    volumes:
      - ml_models:/app/saved_models
      - ml_logs:/app/logs
    networks:
      - lendsmart-network
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: lendsmart-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: lendsmart_dev
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    networks:
      - lendsmart-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: lendsmart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123 --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lendsmart-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  lendsmart-network:
    driver: bridge

# ─── Volumes ────────────────────────────────────────────────────────────────
volumes:
  mongo_data:
  mongo_config:
  redis_data:
  backend_logs:
  backend_uploads:
  ml_models:
  ml_logs:
