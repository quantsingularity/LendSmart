global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "lendsmart-monitor"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "lendsmart-backend"
    static_configs:
      - targets: ["backend:3000"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  - job_name: "lendsmart-credit-risk"
    static_configs:
      - targets: ["credit-risk:8000"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  - job_name: "mongo"
    static_configs:
      - targets: ["mongo:27017"]
    scrape_interval: 30s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    scrape_interval: 30s
